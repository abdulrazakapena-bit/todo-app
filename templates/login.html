<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #1a1a4e, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 32px 28px;
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo { font-size: 36px; text-align: center; margin-bottom: 8px; }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      text-align: center;
      margin-bottom: 28px;
    }
    .flash {
      background: rgba(255,100,100,0.15);
      border: 1px solid rgba(255,100,100,0.3);
      color: #ff9999;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }
    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 14px 18px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    input:focus { border-color: #6c63ff; background: rgba(108,99,255,0.1); }
    .btn {
      width: 100%;
      background: #6c63ff;
      border: none;
      border-radius: 14px;
      padding: 15px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { background: #5a52e0; }
    .bottom {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
    }
    .bottom a { color: #6c63ff; text-decoration: none; }
    .bottom a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔒</div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to access your tasks</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <p class="flash">⚠️ {{ messages[0] }}</p>
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="field">
        <label>Email</label>
        <input name="email" type="email" placeholder="yourname@gmail.com" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input name="password" type="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>

    <p class="bottom">Don't have an account? <a href="/register">Register here</a></p>
  </div>
</body>
</html>
