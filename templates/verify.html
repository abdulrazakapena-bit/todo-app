<!DOCTYPE html>
<html>
<head>
  <title>Verify Email</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 80px auto; padding: 0 20px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 24px; }
    input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 20px; text-align: center; letter-spacing: 8px; box-sizing: border-box; }
    input:focus { border-color: #4f46e5; outline: none; }
    button { width: 100%; padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    button:hover { background: #4338ca; }
    .flash { color: #c0392b; font-size: 13px; margin-bottom: 12px; background: #fff0f0; padding: 10px 12px; border-radius: 6px; border-left: 3px solid #e53e3e; }
    .timer { font-size: 13px; color: #e53e3e; margin-bottom: 16px; }
    a { color: #4f46e5; font-size: 13px; }
    p { margin-top: 16px; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Verify your email</h1>
  <p class="subtitle">We sent a 6-digit code to your email. Enter it below to complete registration.</p>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <p class="flash">⚠️ {{ messages[0] }}</p>
    {% endif %}
  {% endwith %}

  <p class="timer">Code expires in: <span id="timer">10:00</span></p>

  <form method="POST">
    <input name="code" type="text" maxlength="6" placeholder="000000" required autofocus />
    <button type="submit">Verify</button>
  </form>
  <p>Wrong email? <a href="/register">Go back</a></p>

  <script>
    let seconds = 600;
    const timer = document.getElementById('timer');
    const interval = setInterval(() => {
      seconds--;
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      timer.textContent = `${m}:${s}`;
      if (seconds <= 0) {
        clearInterval(interval);
        timer.textContent = 'Expired!';
        timer.style.fontWeight = 'bold';
      }
    }, 1000);
  </script>
</body>
</html>
